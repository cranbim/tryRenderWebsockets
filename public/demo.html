    <div id="my_id">Waiting for connection number</div>
    <div id="my_control">passive</div>
    <div class="slidecontainer">
        <input type="range" min="0" max="255" value="20" class="slider" id="myRange" oninput="changeValue(this.value)">

    <button onclick="sendTap()">Tap</button>
    <script>
        const wsUrl = 'wss://tryrenderwebsockets.onrender.com/ws'
        let myID=-99
        let myControl=-99

        var connection = new WebSocket(wsUrl);
        const appIdentifier="blvc26"

        connection.onopen = function () {
            console.log("I am connected to the server");
        };

        connection.onerror = function (error) {
            console.log('WebSocket Error ', error);
        };

        connection.onclose = function (){
            let myID=-99
            let myControl=-99
            document.getElementById("my_id").innerText=`refresh to reconnect`
            document.getElementById("my_control").innerText=`passive`
        }

        function tryParseJSONObject (jsonString){
            try {
                var o = JSON.parse(jsonString);
                if (o && typeof o === "object") {
                    return o;
                }
            }
            catch (e) { }
            return false;
        };

        connection.onmessage = function (e) {
            let parsed=tryParseJSONObject(e.data);
            console.log('I received: ', parsed?parsed:e.data);
            if(parsed.appID && parsed.appID==appIdentifier){
                // console.log("Ths is my data")
                console.log(`${parsed.data.control} ${parsed.data.type} ${parsed.data.value}`)
                if(parsed.data.type=="setID"){
                    setMyID(parsed.data.value)
                }
                if(parsed.data.type=="setControl"){
                    setMyControl(parsed.data.value)
                }
            } else {
                console.log("data from someone else's app perhaps")
            }
        };

        function setMyID(id){
            myID=id
            document.getElementById("my_id").innerText=`ID: ${id}`
        }

        function setMyControl(id){
            myControl=id
            document.getElementById("my_control").innerText=`active: ${id}`
        }

        function changeValue(newVal) {
            // output.innerHTML = "Current value: " + newVal;
            sendValue(newVal)
        }

        function sendValue(val){
            sendData("pot",val)
        }

        function sendTap(){
            sendData("pad",128)
        }

        function sendData(type, val){
            if(connection.readyState === WebSocket.OPEN){
                // connection.send(val.toString())
                let message={
                    appID: appIdentifier,
                    data:{
                        control: myControl,
                        type: type,
                        value: val
                    }
                }
                console.log('I am sending :'+message);
                connection.send(JSON.stringify(message));
            } else {
                console.log('I am not connected')
            }
        }
