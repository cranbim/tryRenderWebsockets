        function tryParseJSONObject (jsonString){
            try {
                var o = JSON.parse(jsonString);
                if (o && typeof o === "object") {
                    return o;
                }
            }
            catch (e) { }

            return false;
        };

        connection.onmessage = function (e) {

                console.log("Ths is my data")

                }
                if(parsed.data.type=="youAreLive"){
                    console.log("I am now live")
                }
                if(parsed.data.type=="pot" || parsed.data.type=="pad"){
                    updateValue(parsed.data.control, parsed.data.type, parsed.data.value)
                }
            } else {
                console.log("not mine")
            }
        };
